<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Warm background -->
  <rect width="100" height="100" rx="20" fill="#fff8f5"/>

  <!-- Magnifying glass ring -->
  <circle cx="46" cy="42" r="28" fill="none" stroke="#F5A623" stroke-width="6.5" stroke-linecap="round"/>

  <!-- Handle (lower-right diagonal) -->
  <line x1="66" y1="62" x2="78" y2="75" stroke="#F5A623" stroke-width="7.5" stroke-linecap="round"/>

  <!-- Text-line pills inside the circle -->
  <!-- Row 1: 2 pills -->
  <rect x="32" y="26" width="8" height="4" rx="2" fill="#F5A623"/>
  <rect x="42" y="26" width="8" height="4" rx="2" fill="#F5A623"/>
  <!-- Row 2: 3 pills -->
  <rect x="32" y="32" width="8" height="4" rx="2" fill="#F5A623"/>
  <rect x="42" y="32" width="8" height="4" rx="2" fill="#F5A623"/>
  <rect x="52" y="32" width="8" height="4" rx="2" fill="#F5A623"/>
  <!-- Row 3: 3 pills -->
  <rect x="32" y="38" width="8" height="4" rx="2" fill="#F5A623"/>
  <rect x="42" y="38" width="8" height="4" rx="2" fill="#F5A623"/>
  <rect x="52" y="38" width="8" height="4" rx="2" fill="#F5A623"/>
  <!-- Row 4: 3 pills -->
  <rect x="32" y="44" width="8" height="4" rx="2" fill="#F5A623"/>
  <rect x="42" y="44" width="8" height="4" rx="2" fill="#F5A623"/>
  <rect x="52" y="44" width="8" height="4" rx="2" fill="#F5A623"/>
  <!-- Row 5: 2 pills -->
  <rect x="32" y="50" width="8" height="4" rx="2" fill="#F5A623"/>
  <rect x="42" y="50" width="8" height="4" rx="2" fill="#F5A623"/>
</svg>
